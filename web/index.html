In the face of all this, Susan Howe concludes that there is no editorial approach to Dickinson that could be truly faithful to her poetic innovations. “Words are only frames. No comfortable conclusions. Letters are scrawls, turnabouts, astonishments, strokes, cuts, masks.… [Dickinson’s] manuscripts should be understood as visual productions.

There are dimensions to language that are very difficult to describe with language, and yet it is only in language—in trying to move through it—that one has the privilege of experiencing these dimensions.
