<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wordlace</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap"
    rel="stylesheet" />

</head>

<body>
  <script type="module" src="/src/main.js"></script>

  <div id="topbar">
    <h1>Wordlace</h1>
    <div class="view-tab active" id="tab-pos">Part of Speech</div>
    <div class="view-tab " id="tab-ngram">N-gram</div>
  </div>
    <div id="right-panels">
      <div style="width: 100%; display: flex; flex-direction: column; gap: 2rem">
        <div class="input-section">
          <textarea id="sentence-input" placeholder="Type a sentence…" rows="1"></textarea>
          <button class="weave-btn" id="draw">Weave</button>
          <button class="weave-btn" id="prev-demo">&lt;</button>
          <button class="weave-btn" id="next-demo">></button>
          <button class="weave-btn" id="hide-blue">Show Dependency</button>
          <button class="weave-btn" id="dual-views" aria-pressed="false">Dual Views</button>
        </div>

        <!-- <div id="writer-container" class="">
          <button id="enter-key">Enter ↵</button>
          <button id="clear-key">Clear</button>
          <div id="writer"></div>
        </div> -->
      </div>
    </div>
<div>
  All language is just an attempt to communicate.
“All language is but a poor translation.” —Franz Kafka
"Nothing survives transcription, nothing doesn't survive transcription." -Allison Parrish <a
  href="https://posts.decontextualize.com/nothing-survives-transcription/">link</a>
</div>

  <main class="main-container">
    <div id="canvas-wrap-en">
      <svg id="svg-en"></svg>
    </div>

    <div id="canvas-wrap-lang">
      <svg id="svg-lang"></svg>
    </div>
  </main>

    <overlay-panel id="translation-label" class="translation">
      translation
    </overlay-panel>


</body>

</html>
